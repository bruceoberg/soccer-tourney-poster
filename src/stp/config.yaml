    - { tz: US/Pacific, format: a1, loc: ko_KR  }

tests:
  tournament: latest
  file_suffix: tests
  pages:
    - page_kind: groups_test
    - page_kind: days_test

designs:
  tournament: latest
  file_suffix: designs
  pages:
    - page_kind: cal_only
      variant: alpha
      match_numbers: true
      elimination_hints: false
      group_dots: false
    
    - variant: beta
      elimination_borders: false
      match_numbers: true
      elimination_hints: false
      group_dots: false
    
    - variant: borderless
      main_borders: false
    
    - variant: gold master

