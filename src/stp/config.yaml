simple:
  tournament: latest
  pages:
    - { tz: US/Pacific  }

navid:
  tournament: latest
  file_suffix: navid
  pages:
    - { tz: Asia/Tehran,         loc: fa_IR }
    - { tz: Europe/Amsterdam,    loc: fa_IR }
    - { tz: Europe/Amsterdam,    loc: en_GB }
    - { tz: Europe/Amsterdam,    loc: nl_NL }

hans:
  tournament: latest
  file_suffix: hans
  pages:
    - { tz: US/Pacific, format: a1, loc: en_US  }
    - { tz: US/Pacific, format: a1, loc: es_US  }
    - { tz: US/Pacific, format: a1, loc: zh_CN  }

hant:
  tournament: latest
  file_suffix: hant
